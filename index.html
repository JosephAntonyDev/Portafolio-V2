    <link rel="stylesheet" href="./css/components/navbar.css" />

    <!-- CSS Secciones -->
    <link rel="stylesheet" href="./css/sections/inicio.css" />
    <link rel="stylesheet" href="./css/sections/sobremi.css" />
    <link rel="stylesheet" href="./css/sections/skills.css" />
    <link rel="stylesheet" href="./css/sections/curriculum.css" />
    <link rel="stylesheet" href="./css/sections/certificados.css" />
    <link rel="stylesheet" href="./css/sections/logros.css" />
    <link rel="stylesheet" href="./css/sections/portfolio.css" />
    <link rel="stylesheet" href="./css/sections/contacto.css" />
    <link rel="stylesheet" href="./css/sections/footer.css" />
    <!-- CSS Responsive -->
    <link rel="stylesheet" href="./css/responsive.css" />
    
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
      integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    
    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Jose Antonio",
      "url": "https://josepantony.dev/",
      "image": "./img/sobremi/foto.png",
      "jobTitle": "Software Engineer",
      "worksFor": {
        "@type": "Organization",
        "name": "Notaria 178"
      },
      "alumniOf": {
        "@type": "EducationalOrganization",
        "name": "Universidad Politecnica de Chiapas"
      },
      "knowsAbout": ["Backend Development", "DevOps", "Blockchain", "AWS", "Cloud Architecture", "React", "Node.js", "Python", "Go"],
      "sameAs": [
        "https://github.com/JosephAntonyDev",
        "https://linkedin.com/in/jose-antonio"
      ]
    }

  <body>
    <!-- JS: Menú (carga antes del DOM para onclick handlers) -->
    <script src="./js/menu.js"></script>

    <!-- Menu encabezado -->
    <div class="contenedor-header">
      <header>
        <div class="logo">
          <a href="#">Joseph</a>
        </div>
        <nav id="nav">
          <ul>
            <li><a href="#inicio" onclick="seleccionar()">INICIO</a></li>
            <li><a href="#sobremi" onclick="seleccionar()">QUIEN SOY</a></li>
            <li><a href="#skills" onclick="seleccionar()">SKILLS</a></li>
            <li><a href="#curriculum" onclick="seleccionar()">CURRICULUM</a></li>
            <li><a href="#certificados" onclick="seleccionar()">CERTIFICADOS</a></li>
            <li><a href="#portfolio" onclick="seleccionar()">PORTAFOLIO</a></li>
            <li><a href="#contacto" onclick="seleccionar()">CONTACTO</a></li>
          </ul>
        </nav>
        <div class="nav-responsive" onclick="mostrarOcultarMenu()">
          <i class="fa-solid fa-bars"></i>
        </div>
      </header>
    </div>

    <div id="section-inicio"></div>
    <div id="section-sobremi"></div>
    <div id="section-skills"></div>
    <div id="section-curriculum"></div>
    <div id="section-logros"></div>
    <div id="section-certificados"></div>
    <div id="section-portfolio"></div>

    <!-- Modal de Proyecto (global, usado por js/portfolio.js) -->
    <div id="modal-proyecto" class="modal-proyecto">
      <div class="modal-contenido">
        <button class="modal-cerrar" onclick="cerrarModal()">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="modal-header">
          <div class="modal-navegacion">
            <a href="#portfolio" class="modal-back" onclick="cerrarModal()">
              <i class="fa-solid fa-arrow-left"></i> Volver
            </a>
            <span class="modal-breadcrumb">Portafolio > <span id="modal-proyecto-nombre"></span></span>
          </div>
        </div>
        <div class="modal-body">
          <!-- Bloque 1: Título -->
          <div class="modal-titulo-bloque">
            <h2 id="modal-titulo"></h2>
            <div class="modal-linea"></div>
          </div>
          <!-- Bloque 2: Descripción -->
          <div class="modal-desc-bloque">
            <p id="modal-descripcion"></p>
          </div>
          <!-- Bloque 3: Media (imagen o galería) -->
          <div class="modal-media-bloque">
            <div class="modal-imagen-principal">
              <img id="modal-imagen" src="" alt="Proyecto">
            </div>
            <!-- Galería para apps Android (generada dinámicamente) -->
            <div id="modal-galeria" class="galeria-movil" style="display:none;"></div>
          </div>
          <!-- Bloque 4: Stats + Botones + Tecnologías -->
          <div class="modal-info-bloque">
            <div class="modal-stats">
              <div class="stat">
                <i class="fa-solid fa-code"></i>
                <div class="stat-info">
                  <span id="modal-tech-count">0</span>
                  <small>Tecnologías</small>
                </div>
              </div>
              <div class="stat">
                <i class="fa-solid fa-star"></i>
                <div class="stat-info">
                  <span id="modal-features-count">0</span>
                  <small>Features</small>
                </div>
              </div>
            </div>
            <div class="modal-botones">
              <a id="modal-demo-link" href="#" target="_blank" class="modal-btn modal-btn-demo">
                <i class="fa-solid fa-external-link"></i> Live Demo
              </a>
              <a id="modal-github-link" href="#" target="_blank" class="modal-btn modal-btn-github">
                <i class="fa-brands fa-github"></i> GitHub
              </a>
            </div>
            <div class="modal-tecnologias">
              <h4><i class="fa-solid fa-code"></i> Tecnologías Utilizadas</h4>
              <div id="modal-tech-list" class="modal-tech-list"></div>
            </div>
          </div>
          <!-- Bloque 5: Features -->
          <div class="modal-features-bloque">
            <div class="modal-features">
              <h4><i class="fa-solid fa-sparkles"></i> Características Principales</h4>
              <ul id="modal-features-list"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Lightbox fullscreen para galería -->
    <div id="galeria-lightbox" class="galeria-lightbox">
      <button class="lightbox-cerrar" onclick="cerrarLightbox()">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <div class="lightbox-contenido">
        <img id="lightbox-imagen" src="" alt="Screenshot">
      </div>
      <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
      <div class="lightbox-counter">
        <span id="lightbox-counter-text"></span>
      </div>
    </div>

    <div id="section-contacto"></div>

    <!-- Toast Notification (global, usado por js/toast.js) -->
    <div id="toast" class="toast">
      <div class="toast-content">
        <i class="toast-icon fa-solid fa-check-circle"></i>
        <div class="toast-message">
          <span class="toast-title">¡Éxito!</span>
          <span class="toast-text">Tu mensaje ha sido enviado correctamente.</span>
        </div>
      </div>
      <div class="toast-progress"></div>
    </div>

    <div id="section-footer"></div>

    <!-- ========================================== -->
    <!-- JS Modules         -->
    <!-- ========================================== -->
    <script src="./js/utils.js"></script>
    <script src="./js/toast.js"></script>
    <script src="./js/contacto.js"></script>
    <script src="./js/portfolio-data.js"></script>
    <script src="./js/portfolio.js"></script>
    <script src="./js/certificados.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
